# External Secrets Operator — AWS Secrets Manager example
# Use after Terraform apply. Replace CLUSTER_NAME, ROLE_ARN with your EKS IRSA role.
#
# Prerequisites:
# - External Secrets Operator installed
# - IRSA role with secretsmanager:GetSecretValue on taskforge/* secrets
# - SecretStore configured for AWS
#
# Apply: kubectl apply -f external-secrets-aws-example.yaml -n taskforge-prod

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taskforge-backend-secrets
  namespace: taskforge-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: taskforge-backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: taskforge/prod/backend
        property: url
    - secretKey: SECRET_KEY
      remoteRef:
        key: taskforge/prod/backend
        property: secret_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taskforge-security-secrets
  namespace: taskforge-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: taskforge-security-secrets
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: taskforge/prod/security
        property: api_key
